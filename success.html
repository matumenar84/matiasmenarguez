<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Received | Matias Menarguez</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,600;1,700&family=Tenor+Sans&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Tenor Sans', sans-serif; 
            background-color: #0a0a0a; 
            color: #d1d1d1; 
            line-height: 1.7;
        }
        .serif { 
            font-family: 'Cormorant Garamond', serif; 
            font-style: italic;
        }
    </style>
</head>
<body class="h-screen flex items-center justify-center text-center px-6">
    <div class="max-w-xl">
        <h1 id="success-header" class="serif text-5xl md:text-6xl italic text-cyan-400 mb-6">Brief Received.</h1>
        
        <p id="success-body" class="text-xl text-gray-400 mb-10 leading-relaxed">
            Thanks for reaching out! I will get back to you shortly.
        </p>
        
        <div id="dynamic-cta" class="mt-12 space-y-8 pt-8 border-t border-white/5">
            </div>

        <div class="mt-16 pt-8 border-t border-white/5">
            <p class="text-[10px] uppercase tracking-[0.3em] text-gray-600 mb-4">While you wait, you can follow me on IG!</p>
            <div class="flex justify-center space-x-8 text-xs uppercase tracking-widest font-bold">
                <a href="https://instagram.com/matumenar" target="_blank" class="hover:text-cyan-400 transition text-white">Instagram</a>
                <a href="index.html" class="hover:text-cyan-400 transition text-white border-b border-white/20">Back to Home</a>
            </div>
        </div>
    </div>

    <script>
        // Reads the '?type=' parameter we set up in the index.html form handler
        const params = new URLSearchParams(window.location.search);
        const type = params.get('type');
        const header = document.getElementById('success-header');
        const body = document.getElementById('success-body');
        const cta = document.getElementById('dynamic-cta');

        if (type === 'Lessons') {
            header.innerText = "Let's Play.";
            body.innerText = "Your student inquiry is in the pocket. Ready to pick a time for our first session right now?";
            cta.innerHTML = `
                <div class="flex flex-col md:flex-row justify-center gap-4">
                    <a href="https://calendly.com/matumenar/welcome-class" class="px-8 py-4 bg-white text-black font-bold uppercase text-[10px] tracking-[0.2em] hover:bg-cyan-500 transition shadow-xl">Book Free Intro</a>
                    <a href="https://buy.stripe.com/3cI9AVgq2aMP5WVcZQbwk02" class="px-8 py-4 border border-white/20 text-white font-bold uppercase text-[10px] tracking-[0.2em] hover:bg-white/10 transition">Reserve Weekly Slot</a>
                </div>
            `;
        } else {
            // Default for Drums or Mixing
            header.innerText = "Got the Brief.";
            body.innerText = "Thanks for the details. I review all recording and mixing requests within 24 hours to provide an accurate quote.";
            cta.innerHTML = `
                <p class="text-xs uppercase tracking-[0.2em] text-gray-500 italic">In the meantime, you can review more of my work below:</p>
                <a href="index.html#listen" class="inline-block px-8 py-4 border border-cyan-500/30 text-cyan-400 font-bold uppercase text-[10px] tracking-[0.2em] hover:bg-cyan-500 hover:text-black transition">Listen to Selected Works</a>
            `;
        }
    </script>
</body>
</html>
